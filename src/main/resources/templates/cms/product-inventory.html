<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tồn kho - Admin Shop</title>
    <link rel="stylesheet" href="/css/styles.css">

<body>
<div class="admin-container">
    <div th:include="cms/common/sidebar.html :: sidebar-fragment"></div>

    <main class="main-content">
        <div th:replace="cms/common/header.html :: header('Quản lý tồn kho')"></div>

        <div class="row mb-4">
            <div class="col-xl-2 col-md-4 col-sm-6 mb-3">
                <div class="inventory-card">
                    <h6>Total Variants</h6>
                    <h2 id="totalVariants">0</h2>
                </div>
            </div>
            <div class="col-xl-2 col-md-4 col-sm-6 mb-3">
                <div class="inventory-card">
                    <h6>Inventory Value</h6>
                    <h2 id="inventoryValue">0 VNĐ</h2>
                </div>
            </div>
            <div class="col-xl-2 col-md-4 col-sm-6 mb-3">
                <div class="inventory-card warning">
                    <h6>Low Stock</h6>
                    <h2 id="lowStock">0</h2>
                </div>
            </div>
            <div class="col-xl-2 col-md-4 col-sm-6 mb-3">
                <div class="inventory-card danger">
                    <h6>Out Of Stock</h6>
                    <h2 id="outOfStock">0</h2>
                </div>
            </div>
            <div class="col-xl-2 col-md-4 col-sm-6 mb-3">
                <div class="inventory-card success">
                    <h6>Total Sold</h6>
                    <h2 id="totalSold">0</h2>
                </div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <h3>Chi tiết tồn kho</h3>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Tìm kiếm sản phẩm...">
                </div>
            </div>

            <table class="table table-bordered table-hover">
                <thead>
                <tr>
                    <th>Product</th>
                    <th>SKU</th>
                    <th>Variant</th>
                    <th>On Hand</th>
                    <th>Reserved</th>
                    <th>Available</th>
                    <th>Lifetime Sold</th>
                    <th>Inventory Value</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody id="variantTableBody"></tbody>
            </table>
            <div class="d-flex justify-content-between align-items-center mt-3">

                <div id="pageInfo"></div>

                <div id="pagination"></div>

            </div>
        </div>

        <div class="modal fade" id="historyModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-xl modal-dialog-centered"> <div class="modal-content shadow-lg border-0">
                <div class="modal-header bg-light">
                    <h5 class="modal-title font-weight-bold text-secondary">
                        <i class="fas fa-history mr-2"></i> Inventory History
                    </h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-striped align-middle mb-0">
                            <thead class="thead-light">
                            <tr>
                                <th class="border-top-0 pl-4">Time</th>
                                <th class="border-top-0">Type</th>
                                <th class="border-top-0 text-right">Before</th>
                                <th class="border-top-0 text-center">Change</th>
                                <th class="border-top-0 text-right">After</th>
                                <th class="border-top-0">Reference</th>
                                <th class="border-top-0 pr-4">Reason</th>
                            </tr>
                            </thead>
                            <tbody id="historyTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer bg-light py-2">
                    <button type="button" class="btn btn-secondary btn-sm" data-dismiss="modal">Close</button>
                </div>
            </div>
            </div>
        </div>
    </main>
</div>

<div class="modal fade" id="adjustModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Adjust Inventory</h5>
                <button class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="variantId">
                <div class="form-group">
                    <label>Current Stock</label>
                    <input id="currentStock" class="form-control" readonly>
                </div>
                <div class="form-group">
                    <label>Movement Type</label>
                    <select id="movementType" class="form-control">
                        <option value="IMPORT">Import</option>
                        <option value="RETURN">Return</option>
                        <option value="DAMAGED">Damaged</option>
                        <option value="LOST">Lost</option>
                        <option value="ADJUSTMENT">Manual Adjustment</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input id="quantity" type="number" class="form-control">
                </div>
                <div class="form-group">
                    <label>Reference</label>
                    <input id="reference" class="form-control" placeholder="PO-001">
                </div>
                <div class="form-group">
                    <label>Reason</label>
                    <textarea id="reason" class="form-control"></textarea>
                </div>
                <hr>
                <h5>Result Stock : <span id="resultStock"></span></h5>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-dismiss="modal">Close</button>
                <button id="saveAdjustBtn" class="btn btn-success" onclick="saveAdjustment()">Save</button>
            </div>
        </div>
    </div>
</div>

<script>
    function exportInventory() {
        alert('Xuất dữ liệu tồn kho ra Excel thành công!');
    }

    // Search functionality
    document.getElementById('searchInput').addEventListener('keyup', function() {
        const searchText = this.value.toLowerCase();
        const rows = document.getElementById('variantTableBody').getElementsByTagName('tr');

        for (let row of rows) {
            const text = row.textContent.toLowerCase();
            row.style.display = text.includes(searchText) ? '' : 'none';
        }
    });
</script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
