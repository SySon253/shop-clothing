<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý quần áo - Admin Shop</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="../cms/product-manager.js"></script>
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <div th:include="cms/common/sidebar.html :: sidebar-fragment"></div>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- HEADER -->
            <div th:replace="cms/common/header.html :: header('Quản lý quần áo')"></div>

            <!-- TABLE CONTAINER -->
            <div class="table-container">
                <div class="table-header">
                    <h3>Danh sách sản phẩm</h3>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Tìm kiếm sản phẩm...">
                        <button class="btn btn-primary" onclick="openAddModal()">+ Thêm mới</button>
                    </div>
                </div>

                <table id="productTable">
                    <thead>
                        <tr>
                            <th>Hình ảnh</th>
                            <th>Tên sản phẩm</th>
                            <th>SKU</th>
                            <th>Danh mục</th>
                            <th>Giá</th>
                            <th>Tồn kho</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="productList">

                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- MODAL FORM -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Thêm sản phẩm mới</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="productForm" onsubmit="saveProduct(event)">
                <div class="form-group">
                    <label>Tên sản phẩm</label>
                    <input type="text" id="productName" required>
                </div>

                <div class="form-group">
                    <label>Thương hiệu</label>
                    <input type="text" id="productBrand" required>
                </div>

                <div class="form-group">
                    <label>Danh mục</label>
                    <select id="productCategory" required>
                        <option value="">Chọn danh mục</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Size</label>
                        <input type="text" id="productSize">
                    </div>

                    <div class="form-group">
                        <label>Màu sắc</label>
                        <input type="text" id="productColor">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>SKU</label>
                        <input type="text" id="productSKU" required>
                    </div>

                    <div class="form-group">
                        <label>Giá</label>
                        <input type="number" id="productPrice" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Tồn kho</label>
                        <input type="number" id="productStock" required>
                    </div>

                    <div class="form-group">
                        <label>Hình ảnh URL</label>
                        <input type="text" id="productImage">
                    </div>
                </div>

<!--                <div class="form-row">-->
<!--                    <div class="form-group">-->
<!--                        <label>Giá giảm</label>-->
<!--                        <input type="number" id="discountPrice">-->
<!--                    </div>-->

<!--                    <div class="form-group">-->
<!--                        <label>Tồn giữ chỗ</label>-->
<!--                        <input type="number" id="reservedStock" value="0">-->
<!--                    </div>-->
<!--                </div>-->

                <div class="form-group">
                    <label>Mô tả</label>
                    <textarea id="productDescription"></textarea>
                </div>

                <div class="form-buttons">
                    <button type="button"
                            class="btn btn-secondary"
                            onclick="closeModal()">
                        Hủy
                    </button>

                    <button type="submit"
                            class="btn btn-success">
                        Lưu
                    </button>
                </div>
            </form>
        </div>
    </div>


    <script>
        let isEditMode = false;
        let editingId = null;

        function openAddModal() {
            isEditMode = false;
            editingId = null;
            document.getElementById('modalTitle').textContent = 'Thêm sản phẩm mới';
            document.getElementById('productForm').reset();
            document.getElementById('productModal').classList.add('show');
        }

        // function editProduct(id, name, sku, category, price, stock) {
        //     isEditMode = true;
        //     editingId = id;
        //     document.getElementById('modalTitle').textContent = 'Chỉnh sửa sản phẩm';
        //     document.getElementById('productName').value = name;
        //     document.getElementById('productSKU').value = sku;
        //     document.getElementById('productCategory').value = category;
        //     document.getElementById('productPrice').value = price;
        //     document.getElementById('productStock').value = stock;
        //     document.getElementById('productModal').classList.add('show');
        // }

        function closeModal() {
            document.getElementById('productModal').classList.remove('show');
            document.getElementById('productForm').reset();
        }

        // function saveProduct(event) {
        //     event.preventDefault();
        //     const name = document.getElementById('productName').value;
        //     const sku = document.getElementById('productSKU').value;
        //     const category = document.getElementById('productCategory').value;
        //     const price = document.getElementById('productPrice').value;
        //     const stock = document.getElementById('productStock').value;
        //
        //     if (isEditMode) {
        //         alert('Cập nhật sản phẩm ' + name + ' thành công!');
        //     } else {
        //         alert('Thêm sản phẩm ' + name + ' thành công!');
        //     }
        //     closeModal();
        // }

        // function deleteProduct(id) {
        //     if (confirm('Bạn chắc chắn muốn xóa sản phẩm này?')) {
        //         alert('Xóa sản phẩm thành công!');
        //         // Remove row from table
        //         event.target.closest('tr').remove();
        //     }
        // }

        // Search functionality
        document.getElementById('searchInput').addEventListener('keyup', function() {
            const searchText = this.value.toLowerCase();
            const rows = document.getElementById('productList').getElementsByTagName('tr');

            for (let row of rows) {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(searchText) ? '' : 'none';
            }
        });

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('productModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        function logout() {
            if (confirm('Bạn chắc chắn muốn đăng xuất?')) {
                alert('Đã đăng xuất thành công!');
            }
        }
    </script>
</body>
</html>
