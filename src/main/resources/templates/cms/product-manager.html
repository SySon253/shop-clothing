<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý quần áo - Admin Shop</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="../cms/product-manager.js"></script>
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <div th:include="cms/common/sidebar.html :: sidebar-fragment"></div>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- HEADER -->
            <div th:replace="cms/common/header.html :: header('Quản lý quần áo')"></div>

            <!-- TABLE CONTAINER -->
            <div class="table-container">
                <div class="table-header">
                    <h3>Danh sách sản phẩm</h3>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Tìm kiếm sản phẩm...">
                        <button class="btn btn-primary" onclick="openModal()">+ Thêm mới</button>
                    </div>
                </div>

                <table id="productTable">
                    <thead>
                    <tr>
                        <th>Hình ảnh</th>
                        <th>Tên sản phẩm</th>
                        <th>Danh mục</th>
                        <th>Giá từ</th>
                        <th>Tổng tồn</th>
                        <th>Số Variant</th>
                        <th>Trạng thái</th>
                        <th>Hành động</th>
                    </tr>
                    </thead>
                    <tbody id="productList">

                    </tbody>
                </table>
                <div id="pagination"
                     class="pagination">
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL FORM -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Thêm sản phẩm mới</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="productForm" onsubmit="saveProduct(event)">
                <div class="form-group">
                    <label>Tên sản phẩm</label>
                    <input type="text" id="productName" required>
                </div>

                <div class="form-group">
                    <label>Thương hiệu</label>
                    <input type="text" id="productBrand" required>
                </div>

                <div class="form-group">
                    <label>Danh mục</label>
                    <select id="productCategory" required>
                        <option value="">Chọn danh mục</option>
                    </select>
                </div>

                <!-- <div class="form-row">
                    <div class="form-group">
                        <label>Size</label>
                        <input type="text" id="productSize">
                    </div>

                    <div class="form-group">
                        <label>Màu sắc</label>
                        <input type="text" id="productColor">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>SKU</label>
                        <input type="text" id="productSKU" required>
                    </div>

                    <div class="form-group">
                        <label>Giá</label>
                        <input type="number" id="productPrice" min="1" required>
                    </div>
                </div>-->

                <div class="form-row">
                    <!--<div class="form-group">
                        <label>Tồn kho</label>
                        <input type="number" id="productStock" min="0" required>
                    </div>-->

                    <div class="form-group">
                        <label>Hình ảnh URL</label>
                        <input type="text" id="productImage">
                    </div>
                </div>
                <div class="form-group">
                    <label>Mô tả</label>
                    <textarea id="productDescription"></textarea>
                </div>

                <div class="form-buttons">
                    <button type="button"
                            class="btn btn-secondary"
                            onclick="closeModal()">
                        Hủy
                    </button>

                    <button type="submit"
                            class="btn btn-success">
                        Lưu
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL VARIANT -->
    <div id="variantModal" class="modal">

        <div class="modal-content" style="width:900px;">

            <div class="modal-header">

                <h2 id="variantTitle">

                    Quản lý Variant

                </h2>

                <button
                        class="close-btn"
                        onclick="closeVariantModal()">

                    &times;

                </button>

            </div>

            <div style="margin-bottom:20px;">

                <button
                        class="btn btn-success"
                        onclick="openAddVariantForm()">

                    + Thêm Variant

                </button>

            </div>

            <div id="variantFormContainer" style="margin-bottom:20px;">

                <div class="form-row">

                    <div class="form-group">
                        <label>SKU</label>
                        <input type="text" id="variantSku">
                    </div>

                    <div class="form-group">
                        <label>Size</label>
                        <select id="variantSize">

                            <option value="S">S</option>

                            <option value="M">M</option>

                            <option value="L">L</option>

                            <option value="XL">XL</option>

                            <option value="XXL">XXL</option>

                        </select>
                    </div>

                </div>

                <div class="form-row">

                    <div class="form-group">
                        <label>Màu</label>
                        <input type="text" id="variantColor">
                    </div>

                    <div class="form-group">
                        <label>Giá</label>
                        <input type="number" id="variantPrice">
                    </div>

                </div>

                <div class="form-row">

                    <div class="form-group">
                        <label>Tồn kho</label>
                        <input type="number" id="variantStock">
                    </div>

                </div>

                <button
                        id="saveVariantBtn"
                        class="btn btn-success"
                        onclick="saveVariant()">

                    Lưu Variant

                </button>

            </div>

            <table class="table">

                <thead>

                <tr>

                    <th>SKU</th>

                    <th>Size</th>

                    <th>Màu</th>

                    <th>Giá</th>

                    <th>Tồn kho</th>

                    <th>Hành động</th>

                </tr>

                </thead>

                <tbody id="variantList">

                </tbody>

            </table>

        </div>

    </div>

</body>
</html>
