<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thống kê đơn hàng - Admin Shop</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="../cms/product-orders.js"defer></script>
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <div th:include="cms/common/sidebar.html :: sidebar-fragment"></div>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- ORDER TABLE -->
            <div class="table-container">
                <div class="table-header">
                    <h3>Danh sách đơn hàng</h3>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Tìm kiếm đơn hàng...">
                    </div>
                    <select id="statusFilter"
                            class="form-control">

                        <option value="">
                            Tất cả
                        </option>

                        <option value="WAITING_PAYMENT">
                            Chờ thanh toán
                        </option>

                        <option value="PAID">
                            Đã thanh toán
                        </option>

                        <option value="PROCESSING">
                            Đang xử lý
                        </option>

                        <option value="SHIPPING">
                            Đang giao
                        </option>

                        <option value="COMPLETED">
                            Hoàn thành
                        </option>

                        <option value="CANCELLED">
                            Đã hủy
                        </option>

                    </select>
                </div>

                <table id="orderTable">
                    <thead>
                        <tr>
                            <th>Mã đơn</th>
                            <th>Khách hàng</th>
                            <th>Số điện thoại</th>
                            <th>Địa chỉ</th>
                            <th>Sản phẩm</th>
                            <th>Tổng tiền</th>
                            <th>Ngày đặt</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="orderList">


                    </tbody>
                </table>
                <div id="pagination"
                     class="mt-3 d-flex justify-content-center">
                </div>
            </div>

            <!-- MONTHLY STATS TABLE -->

        </main>
    </div>

    <!-- ORDER DETAIL MODAL -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Chi tiết đơn hàng</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div style="padding: 20px;">
                <p><strong>Mã đơn hàng:</strong> <span id="orderCode"></span></p>
                <p><strong>Khách hàng:</strong> <span id="orderCustomer"></span></p>
                <p><strong>Ngày đặt:</strong> <span id="orderDate"></span></p>
                <p><strong>Tổng tiền:</strong> <span id="orderTotal"></span></p>

                <p>
                    <strong>Sản phẩm:</strong>
                </p>

                <ul id="orderItems">

                </ul>


                <div style="display: flex; gap: 10px; margin-top: 20px; justify-content: center;">
                    <button class="btn btn-secondary" onclick="closeModal()" style="background-color: #95a5a6;">Đóng</button>
                </div>
            </div>
        </div>
    </div>


</body>
</html>
