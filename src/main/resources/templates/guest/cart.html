<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>EShopper - Bootstrap Shop Template</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="Free HTML Templates" name="keywords">
    <meta content="Free HTML Templates" name="description">

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet"> 

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
<header class="topbar">
    <div class="logo">
        <a th:href="@{/}">Shop</a>
    </div>

    <nav class="nav">
        <a href="/home">Trang chủ</a>
        <a href="/user/products">Sản phẩm</a>
        <a href="/user/promotions">Khuyến mãi</a>
        <a href="/user/wishlist">Yêu thích</a>
        <a href="/cart">Giỏ hàng</a>
        <a href="/checkout">Thanh toán</a>
    </nav>

    <div class="user-menu">

        <button type="button" id="userBtn">
            Tài khoản ▾
        </button>

        <div id="userDropdown" class="dropdown">
            <a href="/user/account">Tài khoản</a>
            <a href="/user/orders">Đơn mua</a>
            <a href="/logout">Đăng xuất</a>
        </div>

    </div>
</header>


    <!-- Page Header Start -->
    <div class="container-fluid bg-secondary mb-5">
        <div class="d-flex flex-column align-items-center justify-content-center" style="min-height: 300px">
            <h1 class="font-weight-semi-bold text-uppercase mb-3">Shopping Cart</h1>
            <div class="d-inline-flex">
                <p class="m-0"><a href="">Home</a></p>
                <p class="m-0 px-2">-</p>
                <p class="m-0">Shopping Cart</p>
            </div>
        </div>
    </div>
    <!-- Page Header End -->


    <!-- Cart Start -->
    <div class="container-fluid pt-5">
        <div class="row px-xl-5">
            <div class="col-lg-8 table-responsive mb-5">
                <table class="table table-bordered text-center mb-0">
                    <thead class="bg-secondary text-dark">
                        <tr>
                            <th>Products</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Total</th>
                            <th>Remove</th>
                        </tr>
                    </thead>
                    <tbody class="align-middle">

                    </tbody>
                </table>
            </div>
            <div class="col-lg-4">
                <form class="mb-5" action="">
                    <div class="input-group">
                        <input type="text" class="form-control p-4" placeholder="Coupon Code">
                        <div class="input-group-append">
                            <button class="btn btn-primary">Apply Coupon</button>
                        </div>
                    </div>
                </form>
                <div class="card border-secondary mb-5">
                    <div class="card-header bg-secondary border-0">
                        <h4 class="font-weight-semi-bold m-0">Cart Summary</h4>
                    </div>
                    <div class="card-body">


                        <div class="d-flex justify-content-between mb-3 pt-1">


                            <h6>
                                Selected Items
                            </h6>


                            <h6 id="selected-count">
                                0
                            </h6>


                        </div>



                        <div class="d-flex justify-content-between mb-3 pt-1">


                            <h6>
                                Subtotal
                            </h6>


                            <h6 id="selected-subtotal">
                                0 ₫
                            </h6>


                        </div>



                        <div class="d-flex justify-content-between">


                            <h6>
                                Shipping
                            </h6>


                            <h6 id="selected-shipping">
                                0 ₫
                            </h6>


                        </div>


                    </div>
                    <div class="card-footer border-secondary bg-transparent">
                        <div class="d-flex justify-content-between mt-2">
                            <h5 class="font-weight-bold">Total</h5>
                            <h5 class="font-weight-bold">$160</h5>
                        </div>
<!--                        <a onclick="goCheckout()" href="/checkout" class="btn btn-block btn-primary my-3 py-3">Proceed To Checkout</a>-->
                        <button
                                onclick="goCheckout()"
                                class="btn btn-block btn-primary my-3 py-3">

                            Proceed To Checkout

                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Cart End -->


    <!-- Footer Start -->
    <div th:include="guest/common/footer.html :: footer-fragment"></div>
    <!-- Footer End -->


    <!-- Back to Top -->
    <a href="#" class="btn btn-primary back-to-top"><i class="fa fa-angle-double-up"></i></a>


    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/owlcarousel/owl.carousel.min.js"></script>

    <!-- Contact Javascript File -->
    <script src="mail/jqBootstrapValidation.min.js"></script>
    <script src="mail/contact.js"></script>

    <!-- Template Javascript -->
    <script src="js/cart.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function(){

        const btn = document.getElementById("userBtn");
        const menu = document.getElementById("userDropdown");


        btn.addEventListener("click", function(e){

            e.stopPropagation();

            menu.classList.toggle("show");

        });


        document.addEventListener("click", function(){

            menu.classList.remove("show");

        });


    });
</script>
</body>

</html>
