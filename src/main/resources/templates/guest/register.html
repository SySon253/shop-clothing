<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f8;
            color: #1f2937;
        }

        .auth-panel {
            width: min(460px, calc(100vw - 32px));
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 28px;
            box-shadow: 0 14px 35px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
        }

        p {
            margin: 0 0 24px;
            color: #6b7280;
        }

        label {
            display: block;
            margin: 14px 0 6px;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 15px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 13px 16px;
            border: 0;
            border-radius: 6px;
            background: #111827;
            color: #ffffff;
            font-weight: 700;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.65;
            cursor: wait;
        }

        .message {
            min-height: 22px;
            margin-top: 14px;
            font-size: 14px;
        }

        .message.error {
            color: #b91c1c;
        }

        .message.success {
            color: #047857;
        }

        .links {
            margin-top: 18px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            font-size: 14px;
        }

        a {
            color: #2563eb;
            text-decoration: none;
        }
    </style>
</head>
<body>
<main class="auth-panel">
    <h1>Register</h1>
    <p>Create a customer account.</p>

    <form id="registerForm">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>

        <label for="fullName">Full name</label>
        <input id="fullName" name="fullName" type="text" autocomplete="name">

        <label for="phone">Phone</label>
        <input id="phone" name="phone" type="text" autocomplete="tel">

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required>

        <label for="confirmPassword">Confirm password</label>
        <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" required>

        <button id="submitButton" type="submit">Register</button>
        <div id="message" class="message"></div>
    </form>

    <div class="links">
        <a href="/home">Back to home</a>
        <a href="/login">Already have an account?</a>
    </div>
</main>

<script>
    const form = document.getElementById('registerForm');
    const button = document.getElementById('submitButton');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        button.disabled = true;
        message.className = 'message';
        message.textContent = '';

        if (form.password.value !== form.confirmPassword.value) {
            message.className = 'message error';
            message.textContent = 'Passwords do not match';
            button.disabled = false;
            return;
        }

        const payload = {
            username: form.username.value.trim(),
            email: form.email.value.trim(),
            fullName: form.fullName.value.trim(),
            phone: form.phone.value.trim(),
            password: form.password.value
        };

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                throw new Error('Cannot register this account');
            }

            message.className = 'message success';
            message.textContent = 'Register successfully. Redirecting to login...';
            setTimeout(() => {
                window.location.href = '/login';
            }, 800);
        } catch (error) {
            message.className = 'message error';
            message.textContent = error.message;
        } finally {
            button.disabled = false;
        }
    });
</script>
</body>
</html>
