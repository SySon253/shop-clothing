<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Checkout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>

<header class="topbar">
    <div class="logo">
        <a th:href="@{/}">Shop</a>
    </div>

    <nav class="nav">
        <a href="/home">Trang chủ</a>
        <a href="/user/products">Sản phẩm</a>
        <a href="/user/promotions">Khuyến mãi</a>
        <a href="/user/wishlist">Yêu thích</a>
        <a href="/cart">Giỏ hàng</a>
        <a href="/checkout">Thanh toán</a>
    </nav>

    <div class="user-menu">

        <button type="button" id="userBtn">
            Tài khoản ▾
        </button>

        <div id="userDropdown" class="dropdown">
            <a href="/user/account">Tài khoản</a>
            <a href="/user/orders">Đơn mua</a>
            <a href="/logout">Đăng xuất</a>
        </div>

    </div>
</header>

<!-- HEADER -->
<div class="container-fluid bg-secondary mb-5">
    <div class="d-flex flex-column align-items-center justify-content-center" style="min-height: 300px">
        <h1 class="font-weight-semi-bold text-uppercase mb-3">Checkout</h1>
    </div>
</div>

<!-- CHECKOUT -->
<div class="container-fluid pt-5">
    <div class="row px-xl-5">

        <!-- LEFT: BILLING -->
        <div class="col-lg-8">

            <h4 class="mb-4">Billing Information</h4>

            <div class="row">

                <div class="col-md-12 form-group">
                    <label>Receiver Name</label>
                    <input id="receiverName" class="form-control" type="text" placeholder="Nguyễn Văn A">
                </div>

                <div class="col-md-12 form-group">
                    <label>Phone</label>
                    <input id="phone" class="form-control" type="text" placeholder="0988888888">
                </div>

                <div class="col-md-12 form-group">
                    <label>Address</label>
                    <input id="address" class="form-control" type="text" placeholder="Hà Nội">
                </div>

            </div>

        </div>

        <!-- RIGHT: ORDER -->
        <div class="col-lg-4">

            <div class="card border-secondary mb-5">

                <div class="card-header bg-secondary">
                    <h4 class="font-weight-semi-bold m-0">Order Summary</h4>
                </div>

                <div class="card-body">

                    <h6 class="mb-3">Products</h6>

                    <!-- PRODUCTS -->
                    <div id="checkout-products"></div>

                    <hr>

                    <!-- SUBTOTAL -->
                    <div class="d-flex justify-content-between mb-2">
                        <h6>Subtotal</h6>
                        <h6 id="subtotal">0 ₫</h6>
                    </div>

                    <!-- SHIPPING -->
                    <div class="d-flex justify-content-between mb-2">
                        <h6>Shipping</h6>
                        <h6 id="shipping">0 ₫</h6>
                    </div>

                </div>

                <!-- TOTAL -->
                <div class="card-footer bg-transparent">

                    <div class="d-flex justify-content-between">
                        <h5>Total</h5>
                        <h5 id="total">0 ₫</h5>
                    </div>

                </div>

            </div>

            <!-- PAYMENT -->
            <div class="card border-secondary mb-3 p-3">

                <h5 class="mb-3">Payment Method</h5>

                <label class="d-block">
                    <input type="radio" name="paymentMethod" value="BANKING" checked>
                    VNPay (Bank Transfer)
                </label>

                <label class="d-block">
                    <input type="radio" name="paymentMethod" value="COD">
                    Cash on Delivery
                </label>

            </div>

            <!-- BUTTON -->
            <button
                    id="placeOrderBtn"
                    class="btn btn-primary btn-block py-3">
                Place Order
            </button>

        </div>

    </div>
</div>

<!-- FOOTER -->
<div th:include="guest/common/footer.html :: footer-fragment"></div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>

<script src="js/main.js"></script>
<script src="/js/checkout.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function(){

        const btn = document.getElementById("userBtn");
        const menu = document.getElementById("userDropdown");


        btn.addEventListener("click", function(e){

            e.stopPropagation();

            menu.classList.toggle("show");

        });


        document.addEventListener("click", function(){

            menu.classList.remove("show");

        });


    });
</script>

</body>
</html>
