<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sản phẩm</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="/js/user.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

    <style>
        body{
            background:#0d0d0d;
            font-family:Inter,sans-serif;
        }

        .serif{
            font-family:"Playfair Display",serif;
        }
    </style>

</head>


<body>


<div id="app"></div>



<script>

    const categories = [
        "Tất cả",
        "Men",
        "Women",
        "Polo Shirt",
        "Jeans"
    ];

    const API_PRODUCT = "http://localhost:8080/api/products/all-product";

    let products = [];

    let currentPage = 0;
    let pageSize = 4;

    let totalPages = 0;
    let totalElements = 0;
    let wishlist = [];

    let search = "";
    let searchInput = "";
    let category = "Tất cả";
    let sort = "newest";





    function toggleWishlist(id){

        if(wishlist.includes(id)){
            wishlist=wishlist.filter(x=>x!==id);
        }else{
            wishlist.push(id);
        }

        render();

    }


    function getFiltered() {

        return products

            .filter(product => {

                if (category === "Tất cả") {
                    return true;
                }

                return product.category &&
                    product.category.name === category;

            })

            .filter(product =>

                product.name
                    .toLowerCase()
                    .includes(search.toLowerCase())

            )

            .sort((a, b) => {

                const priceA =
                    a.variants?.[0]?.discountPrice ??
                    a.variants?.[0]?.price ??
                    0;

                const priceB =
                    b.variants?.[0]?.discountPrice ??
                    b.variants?.[0]?.price ??
                    0;

                if (sort === "price_asc")
                    return priceA - priceB;

                if (sort === "price_desc")
                    return priceB - priceA;

                return b.id - a.id;

            });

    }

    const sortOptions = [
        {
            label: "Mới nhất",
            value: "newest"
        },
        {
            label: "Giá thấp đến cao",
            value: "price_asc"
        },
        {
            label: "Giá cao đến thấp",
            value: "price_desc"
        }
    ];


    function render() {

        const filtered = getFiltered();

        document.getElementById("app").innerHTML = `

<div class="min-h-screen pt-20">

<div class="max-w-7xl mx-auto px-6 py-16">

<div class="mb-10">

<p
style="
color:#c9a84c;
font-size:.7rem;
letter-spacing:.3em;
text-transform:uppercase;">

Bộ sưu tập

</p>

<h1 class="serif text-white text-4xl">

Tất cả sản phẩm

</h1>

</div>

<div class="flex flex-col sm:flex-row gap-4 mb-8">

<div class="relative flex-1">

    <button
        onclick="doSearch()"
        class="absolute left-4 top-1/2 -translate-y-1/2">

        <i
            data-lucide="search"
            style="color:#8a8a8a"
            width="16">
        </i>

    </button>

    <input

        id="searchInput"

        value="${searchInput}"

        placeholder="Tìm kiếm sản phẩm..."

        oninput="searchInput=this.value"

        onkeydown="
            if(event.key==='Enter'){
                doSearch();
            }
        "

        class="w-full pl-10 pr-4 py-3 rounded-lg"

        style="
        background:#161616;
        border:1px solid rgba(201,168,76,.15);
        color:white;">

</div>

<div class="flex items-center gap-2">

<i
data-lucide="sliders-horizontal"
style="color:#8a8a8a"></i>

<select

onchange="
sort=this.value;
render();
"

class="px-4 py-3 rounded-lg"

style="
background:#161616;
color:white;
border:1px solid rgba(201,168,76,.15);">

${sortOptions.map(o=>`

<option
value="${o.value}"
${sort===o.value?"selected":""}>

${o.label}

</option>

`).join("")}

</select>

</div>

</div>

<div class="flex gap-2 flex-wrap mb-10">

${categories.map(c=>`

<button

onclick="
category='${c}';
render();
"

class="px-4 py-2 rounded-full text-sm"

style="
background:${category===c?"#c9a84c":"#161616"};
color:${category===c?"#0d0d0d":"#f5f0e8"};
border:1px solid rgba(201,168,76,.15);">

${c}

</button>

`).join("")}

</div>

<p
class="text-sm mb-6"
style="color:#8a8a8a">

Hiển thị

<span style="color:#c9a84c">

${totalElements}

</span>

sản phẩm

</p>

${
            filtered.length===0

                ?

                `

<div class="text-center py-20 text-gray-400">

Không tìm thấy sản phẩm.

</div>

`

                :

                `

<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6">

${filtered.map(product=>{

                    const image =
                        product.images?.length
                            ? product.images[0].imageUrl
                            : "/images/no-image.png";

                    const variant =
                        product.variants?.length
                            ? product.variants[0]
                            : null;

                    const price =
                        variant?.price ?? 0;

                    const discountPrice =
                        variant?.discountPrice ?? price;

                    return `

<div
class="rounded-xl overflow-hidden"

style="
background:#161616;
border:1px solid rgba(201,168,76,.1);
transition:.3s;">

<div class="relative">

<img

src="${image}"

class="w-full h-72 object-cover">

<button

onclick="toggleWishlist(${product.id})"

class="absolute top-3 right-3 rounded-full p-2"

style="
background:#0d0d0d;
color:${wishlist.includes(product.id)?"#c9a84c":"white"};">

<i

data-lucide="heart"

fill="${wishlist.includes(product.id)?"#c9a84c":"none"}"

width="18">

</i>

</button>

</div>

<div class="p-5">

<p

class="text-xs uppercase"

style="color:#8a8a8a;">

${product.category?.name ?? ""}

</p>

<h3

class="serif text-white text-xl mt-2">

${product.name}

</h3>

<div class="mt-3">

<span
style="
color:#c9a84c;
font-weight:600;
font-size:18px;">

${fmt(discountPrice)}

</span>

${
                        discountPrice<price

                            ?

                            `<span
style="
margin-left:8px;
color:#888;
text-decoration:line-through;">

${fmt(price)}

</span>`

                            :""

                    }

</div>

<a

href="/product/${product.id}"

class="block w-full mt-5 text-center py-2 rounded-lg"

style="
background:#c9a84c;
color:#0d0d0d;
font-weight:600;">

Xem chi tiết

</a>

</div>

</div>

`;

                }).join("")}

</div>

`

        }

</div>

</div>
<div class="flex justify-center items-center gap-2 mt-12">

<button

onclick="
if(currentPage>0){
loadProducts(currentPage-1);
}
"

class="px-4 py-2 rounded"

style="
background:#161616;
color:white;">

←

</button>

${Array.from(
            {length: totalPages},
            (_,i)=>`

<button

onclick="loadProducts(${i})"

class="px-4 py-2 rounded"

style="
background:${
                currentPage===i
                    ?"#c9a84c"
                    :"#161616"
            };
color:${
                currentPage===i
                    ?"black"
                    :"white"
            };">

${i+1}

</button>

`).join("")}

<button

onclick="
if(currentPage<totalPages-1){
loadProducts(currentPage+1);
}
"

class="px-4 py-2 rounded"

style="
background:#161616;
color:white;">

→

</button>

</div>
`;

        lucide.createIcons();

    }



    document.addEventListener("DOMContentLoaded", () => {
        loadProducts();
    });
    async function loadProducts(page = currentPage) {

        currentPage = page;

        try {

            const response = await fetch(
                API_PRODUCT +
                `?page=${currentPage}&size=${pageSize}`,
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({

                        keyword: search || null,

                        sortBy:
                            sort === "newest"
                                ? "createdDate"
                                : "price",

                        sortDir:
                            sort === "price_desc"
                                ? "desc"
                                : "asc"

                    })
                }
            );

            if (!response.ok) {

                throw new Error("Không tải được sản phẩm");

            }

            const data = await response.json();

            products = data.content;

            totalPages = data.totalPages;

            totalElements = data.totalElements;

            render();

        } catch (e) {

            console.error(e);

        }

    }

    function fmt(price) {

        return Number(price).toLocaleString("vi-VN") + " ₫";

    }
    function doSearch() {

        search = searchInput.trim();

        render();

    }

</script>


</body>

</html>
