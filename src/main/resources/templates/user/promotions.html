<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Khuyến mãi</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="/js/user.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">


    <style>

        body{
            background:#0d0d0d;
            font-family:Inter,sans-serif;
        }

        .serif{
            font-family:"Playfair Display",serif;
        }

    </style>

</head>


<body>


<div id="app"></div>



<script>


    const promotions=[

        {
            id:1,
            name:"Áo khoác Luxury Black",
            category:"Áo khoác",
            price:450000,
            rating:4.8,
            image:"https://images.unsplash.com/photo-1551488831-00ddcb6c6bd3"
        },

        {
            id:2,
            name:"Váy Premium Gold",
            category:"Váy",
            price:550000,
            rating:4.9,
            image:"https://images.unsplash.com/photo-1595777457583-95e059d581b8"
        },

        {
            id:3,
            name:"Áo Designer",
            category:"Áo",
            price:300000,
            rating:4.7,
            image:"https://images.unsplash.com/photo-1598033129183-c4f50c736f10"
        },

        {
            id:4,
            name:"Quần cao cấp",
            category:"Quần",
            price:350000,
            rating:4.6,
            image:"https://images.unsplash.com/photo-1506629905607-d405b7a0c6f2"
        }

    ];



    const vouchers=[

        {
            code:"LUXE20",
            desc:"Giảm 20% cho đơn từ 1.000.000đ",
            expiry:"30/06/2024"
        },

        {
            code:"FREESHIP",
            desc:"Miễn phí vận chuyển mọi đơn hàng",
            expiry:"15/07/2024"
        },

        {
            code:"NEW50K",
            desc:"Giảm 50.000đ cho khách hàng mới",
            expiry:"31/07/2024"
        }

    ];



    let wishlist=[];



    function fmt(price){

        return price.toLocaleString("vi-VN")+" ₫";

    }



    function toggleWishlist(id){

        if(wishlist.includes(id)){

            wishlist=wishlist.filter(x=>x!==id);

        }else{

            wishlist.push(id);

        }

        render();

    }



    function addCart(id){

        const p=promotions.find(x=>x.id===id);

        alert(
            "Đã thêm "+p.name+" vào giỏ hàng"
        );

    }



    function copyVoucher(code){

        navigator.clipboard?.writeText(code);

        alert(
            "Đã sao chép mã "+code
        );

    }



    function render(){


        document.getElementById("app").innerHTML=`


<div class="min-h-screen pt-20">


<div class="max-w-7xl mx-auto px-6 py-16">


<div class="mb-12">


<p style="
color:#c9a84c;
font-size:.7rem;
letter-spacing:.3em;
text-transform:uppercase">

Ưu đãi

</p>


<h1 class="serif text-white text-4xl">

Khuyến mãi đặc biệt

</h1>


</div>





<!-- FLASH SALE -->


<div class="rounded-2xl p-10 mb-14"

style="
background:linear-gradient(
135deg,
#1a1200,
#2a1d00,
#1a1200
);

border:1px solid rgba(201,168,76,.3)
">


<div class="flex flex-col lg:flex-row justify-between gap-8">



<div>

<p style="
color:#c9a84c;
font-size:.7rem;
letter-spacing:.25em">

FLASH SALE

</p>


<h2 class="serif text-white text-3xl mt-3">

Giảm đến

<span style="color:#c9a84c">

40%

</span>

cuối mùa

</h2>


<p class="text-gray-400 mt-2">

Áp dụng cho sản phẩm có nhãn Sale

</p>


</div>



<div class="flex items-center gap-3">


<i data-lucide="clock"
style="color:#c9a84c">
</i>


<div class="flex gap-2">


${["05","18","43"].map((v,i)=>`

<div class="text-center">


<div class="px-4 py-3 rounded-lg text-xl font-bold"

style="
background:rgba(201,168,76,.15);
color:#c9a84c">

${v}

</div>


<p class="text-gray-500 text-xs mt-1">

${["Ngày","Giờ","Phút"][i]}

</p>


</div>


`).join("")}



</div>


</div>


</div>


</div>





<!-- VOUCHER -->


<div class="mb-14">


<h2 class="serif text-white text-2xl mb-5">

Mã giảm giá

</h2>



<div class="grid sm:grid-cols-3 gap-4">


${vouchers.map(v=>`

<div class="rounded-xl p-5 flex flex-col gap-3"

style="
background:#161616;
border:1px dashed rgba(201,168,76,.3)
">


<div class="flex items-center gap-2">

<i data-lucide="tag"
width="16"
style="color:#c9a84c">

</i>


<span style="
color:#c9a84c;
font-weight:700;
letter-spacing:.1em">

${v.code}

</span>


</div>



<p class="text-white text-sm">

${v.desc}

</p>



<div class="flex justify-between items-center mt-auto">


<p class="text-gray-500 text-xs">

HSD: ${v.expiry}

</p>



<button

onclick="copyVoucher('${v.code}')"

class="px-3 py-1 rounded text-xs"

style="
background:rgba(201,168,76,.15);
color:#c9a84c">

Sao chép

</button>


</div>


</div>


`).join("")}


</div>


</div>





<!-- PRODUCTS -->


<h2 class="serif text-white text-2xl mb-6">

Sản phẩm đang giảm giá

</h2>



<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6">



${promotions.map(p=>`


<div class="rounded-xl overflow-hidden"

style="
background:#161616;
border:1px solid rgba(201,168,76,.1)
">


<div class="relative">


<img

src="${p.image}"

class="w-full h-64 object-cover"

>


<button

onclick="toggleWishlist(${p.id})"

class="absolute top-3 right-3 p-2 rounded-full"

style="
background:#0d0d0d;
color:${wishlist.includes(p.id)?"#c9a84c":"white"}
">

<i data-lucide="heart"
fill="${wishlist.includes(p.id)?"#c9a84c":"none"}"
width="18">

</i>


</button>


</div>




<div class="p-4">


<p class="text-xs uppercase text-gray-500">

${p.category}

</p>



<h3 class="serif text-white mt-2">

${p.name}

</h3>



<p class="mt-2"

style="
color:#c9a84c;
font-weight:600">

${fmt(p.price)}

</p>



<p class="text-gray-500 text-sm">

★ ${p.rating}

</p>



<button

onclick="addCart(${p.id})"

class="w-full mt-4 py-2 rounded-lg"

style="
background:#c9a84c;
color:#0d0d0d">

Thêm vào giỏ

</button>



</div>



</div>


`).join("")}



</div>


</div>


</div>


`;



        lucide.createIcons();


    }



    render();


</script>


</body>

</html>
