<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng</title>

    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: #0d0d0d;
            font-family: Inter, sans-serif;
        }

        .serif {
            font-family: "Playfair Display", serif;
        }
    </style>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

</head>

<body>

<div id="app"></div>


<script>

    const products = [
        {
            id: 1,
            name: "Áo khoác Luxury Black",
            category: "Fashion",
            price: 450000,
            image: "https://images.unsplash.com/photo-1551488831-00ddcb6c6bd3"
        },
        {
            id: 2,
            name: "Túi da cao cấp",
            category: "Accessories",
            price: 850000,
            image: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa"
        }
    ];


    let cart = [
        {
            product: products[0],
            qty: 1
        },
        {
            product: products[1],
            qty: 2
        }
    ];


    function fmt(number){
        return number.toLocaleString("vi-VN") + " ₫";
    }


    function updateQty(id, qty){

        const item = cart.find(
            i => i.product.id === id
        );

        if(!item) return;

        if(qty <= 0){
            removeItem(id);
            return;
        }

        item.qty = qty;
        render();
    }


    function removeItem(id){

        cart = cart.filter(
            i => i.product.id !== id
        );

        render();
    }



    function render(){

        const app = document.getElementById("app");


        if(cart.length === 0){

            app.innerHTML = `
<div class="min-h-screen flex flex-col items-center justify-center gap-6">

<i data-lucide="shopping-bag" size="64"
style="color:#252525"></i>

<h2 class="serif text-3xl text-white">
Giỏ hàng trống
</h2>

<p style="color:#8a8a8a">
Bạn chưa thêm sản phẩm nào vào giỏ hàng.
</p>

</div>
`;

            lucide.createIcons();
            return;

        }


        const subtotal = cart.reduce(
            (s,i)=>s+i.product.price*i.qty,0
        );

        const shipping = subtotal >= 500000 ? 0 : 30000;

        const total = subtotal + shipping;


        app.innerHTML = `

<div class="min-h-screen pt-20">

<div class="max-w-7xl mx-auto px-6 py-16">


<div class="mb-10">

<p style="
color:#c9a84c;
font-size:.7rem;
letter-spacing:.3em;
text-transform:uppercase">
Thanh toán
</p>


<h1 class="serif text-4xl text-white">
Giỏ hàng
<span style="color:#8a8a8a;font-size:1.2rem">
(${cart.reduce((s,i)=>s+i.qty,0)} sản phẩm)
</span>
</h1>

</div>



<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">


<div class="lg:col-span-2 flex flex-col gap-4">


${cart.map(({product,qty})=>`

<div class="flex gap-4 p-4 rounded-xl"
style="
background:#161616;
border:1px solid rgba(201,168,76,.1)"
>


<img
src="${product.image}"
class="w-24 h-28 object-cover rounded-lg"
/>


<div class="flex-1">


<p style="
color:#8a8a8a;
font-size:.7rem;
letter-spacing:.1em">
${product.category}
</p>


<h3 class="serif text-white">
${product.name}
</h3>


<p style="
color:#c9a84c;
font-weight:600">
${fmt(product.price)}
</p>



<div class="flex items-center gap-3 mt-3">


<div class="flex rounded-lg overflow-hidden"
style="
border:1px solid rgba(201,168,76,.2)"
>

<button onclick="updateQty(${product.id},${qty-1})"
class="w-8 h-8 text-white bg-[#1e1e1e]">
−
</button>


<span class="w-8 text-center text-white">
${qty}
</span>


<button onclick="updateQty(${product.id},${qty+1})"
class="w-8 h-8 text-white bg-[#1e1e1e]">
+
</button>


</div>


<button onclick="removeItem(${product.id})"
style="color:#8a8a8a">
<i data-lucide="trash-2" size="16"></i>
</button>


</div>


</div>



<div style="color:#c9a84c;font-weight:600">
${fmt(product.price*qty)}
</div>


</div>

`).join("")}


</div>




<div>


<div class="rounded-xl p-6 sticky top-24"
style="
background:#161616;
border:1px solid rgba(201,168,76,.15)"
>


<h2 class="serif text-white text-xl mb-5">
Tóm tắt đơn hàng
</h2>


<div class="space-y-3 text-sm">


<div class="flex justify-between text-gray-400">
<span>Tạm tính</span>
<span class="text-white">
${fmt(subtotal)}
</span>
</div>



<div class="flex justify-between text-gray-400">

<span>Phí vận chuyển</span>

<span class="text-white">
${shipping===0?"Miễn phí":fmt(shipping)}
</span>

</div>


</div>



<hr class="my-5 opacity-20">


<div class="flex justify-between text-white font-semibold">

<span>Tổng cộng</span>

<span style="color:#c9a84c">
${fmt(total)}
</span>

</div>



<input
placeholder="Nhập mã giảm giá"
class="w-full mt-6 px-3 py-3 rounded-lg"
style="
background:#1e1e1e;
color:white;
border:1px solid rgba(201,168,76,.15)"
>



<button
class="w-full mt-5 py-4 rounded-xl font-semibold"
style="
background:#c9a84c;
color:#0d0d0d">

Tiến hành thanh toán →
</button>



</div>


</div>


</div>

</div>

</div>

`;

        lucide.createIcons();

    }


    render();

</script>

</body>
</html>
