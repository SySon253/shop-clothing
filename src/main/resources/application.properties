spring.application.name=shop-clothing

# MySQL configurations
spring.datasource.url=jdbc:mysql://localhost:3306/shopclothingstoredemo2?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=123456
# JPA configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
# properties
jwt.secret=your-secret-key-must-be-at-least-32-characters
jwt.expiration=86400000
